<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact HostelCart</title>

    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="contact.css">
</head>

<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                Hostel<span>Cart</span>
            </a>
        </div>
    </header>

    <div class="contact-container">

        <h1>Contact Us</h1>

        <p class="subtitle">
            Have questions or issues? Fill in your details and we will get back to you.
        </p>

        <form class="contact-form">

            <input
                type="text"
                placeholder="Enter Full Name"
                required
            >

            <input
                type="tel"
                placeholder="Enter Phone Number"
                required
            >

            <input
                type="email"
                placeholder="Enter Email Address"
                required
            >

            <input
                type="text"
                placeholder="Hostel / Room Number"
            >

            <textarea
                rows="6"
                placeholder="Write your message here..."
            ></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

        <div class="contact-info">

            <h2>HostelCart Support</h2>

            <p>
                <strong>Email:</strong>
                support@hostelcart.com
            </p>

            <p>
                <strong>Phone:</strong>
                +91 98765 43210
            </p>

            <p>
                <strong>Working Hours:</strong>
                Monday - Saturday | 9:00 AM - 10:00 PM
            </p>

            <p>
                <strong>Address:</strong>
                HostelCart Campus Center, Student Avenue
            </p>

        </div>

    </div>

</body>

</html>
